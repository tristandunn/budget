name: CI

on: # yamllint disable-line rule:truthy
  push:
    branches:
      - main
  pull_request:
  workflow_call:

jobs:
  Ruby:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout the code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Install Ruby
        uses: ruby/setup-ruby@9eb537ca036ebaed86729dcb9309076e4c5c3b74 # v1
        with:
          bundler-cache: true

      - name: Run the Ruby tests
        env:
          COVERAGE: true
          RAILS_ENV: test
          SE_AVOID_STATS: true
        run: bin/rails db:setup ruby:test

  JavaScript:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout the code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Enable the Corepack tool
        run: corepack enable

      - name: Install Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version-file: ".tool-versions"

      - name: Install the Node dependencies
        run: yarn install

      - name: Run the JavaScript tests
        run: yarn test:coverage

  Linting:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout the code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Install Ruby
        uses: ruby/setup-ruby@9eb537ca036ebaed86729dcb9309076e4c5c3b74 # v1
        with:
          bundler-cache: true

      - name: Enable the Corepack tool
        run: corepack enable

      - name: Install Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version-file: ".tool-versions"

      - name: Install the Node dependencies
        run: yarn install

      - name: Lint the ERB
        run: bin/rake erb:lint

      - name: Lint the ERB (Herb)
        run: yarn lint:erb

      - name: Check the ERB formatting (Herb)
        run: yarn check:erb

      - name: Lint the Ruby
        run: bin/rubocop --format github --parallel

      - name: Lint the JavaScript
        run: yarn lint:js

      - name: Lint the CSS
        run: yarn lint:css

  Docker:
    runs-on: ubuntu-latest

    steps:
      - name: Set up QEMU
        uses: docker/setup-qemu-action@06116385d9baf250c9f4dcb4858b16962ea869c3 # v4

      - name: Set up Docker
        uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4

      - name: Build the image
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7
        with:
          cache-from: type=gha
          cache-to: type=gha,mode=max
          push: false

  Vulnerabilities:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout the code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Install Ruby
        uses: ruby/setup-ruby@9eb537ca036ebaed86729dcb9309076e4c5c3b74 # v1
        with:
          bundler-cache: true

      - name: Scan for vulnerabilities
        run: bin/brakeman --format github --no-pager

      - name: Scan for vulnerabilities in JavaScript dependencies
        run: bin/importmap audit
